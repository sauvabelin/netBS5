

netbs:
  resource: '@NetBSCoreBundle/Resources/config/routing.yml'
  prefix: /netBS

netbs_api:
  resource: "@NetBSCoreBundle/Resources/config/routing_api.yml"
  prefix: /api/v1/netBS

facturation:
  resource: '@OvescoFacturationBundle/Resources/config/routing.yml'
  prefix: /netBS/facturation

mailing:
  resource: '@IacopoMailingBundle/Resources/config/routing.yml'
  prefix: /netBS/mailing

home:
  path: /
  controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::urlRedirectAction
  defaults:
    path: /netBS
    permanent: true

# AuthBundle routes are split by audience: the OIDC endpoints are named by
# Hydra config (URLS_LOGIN, URLS_CONSENT, …) and must resolve at the root,
# whereas the admin CRUD belongs under the netBS admin tree.
auth_oidc:
  resource: '@NetBSAuthBundle/Controller/Identity/'
  type: attribute
  prefix: /

auth_admin:
  resource: '@NetBSAuthBundle/Controller/Admin/'
  type: attribute
  prefix: /netBS/secure/administration/authentification