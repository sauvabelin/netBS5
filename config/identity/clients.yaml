clients:
  nextcloud:
    name: "Nextcloud"
    redirect_uris:
      - "http://cloud.localhost:8080/apps/user_oidc/code"
    post_logout_redirect_uris:
      - "http://cloud.localhost:8080/"
    backchannel_logout_uri: "http://cloud.localhost:8080/apps/user_oidc/backchannel-logout"
    scope: "openid profile email groups"
    secret_env: NEXTCLOUD_OIDC_CLIENT_SECRET
    allowed_claims: [sub, preferred_username, email, email_verified, name, groups, nextcloud_admin, nextcloud_quota]

  wiki:
    name: "Wiki"
    redirect_uris:
      - "http://wiki.localhost:8080/oidc/callback"
    scope: "openid profile email"
    secret_env: WIKI_OIDC_CLIENT_SECRET
    allowed_claims: [sub, preferred_username, email, email_verified, name, wiki_admin]
