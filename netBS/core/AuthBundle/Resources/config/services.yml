services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  NetBS\AuthBundle\:
    resource: '../../*'
    exclude: '../../{Dto,Tests,Resources,DependencyInjection,NetBSAuthBundle.php}'

  # Hydra admin client (env-injected URL)
  NetBS\AuthBundle\Service\HydraAdminClient:
    arguments:
      $hydraAdminUrl: '%env(HYDRA_ADMIN_URL)%'

  # Contract → concrete policy (lives in bundle)
  NetBS\AuthBundle\Contract\IdentityClientPolicyInterface:
    alias: NetBS\AuthBundle\Service\IdentityClientPolicy

  NetBS\AuthBundle\Service\OidcEndpoints:
    arguments:
      $issuer: '%env(HYDRA_ISSUER)%'

  NetBS\AuthBundle\Listener\MainMenuListener:
    tags:
      - { name: kernel.event_listener, event: netbs.menu.extend, method: onMenuConfigure }

  NetBS\AuthBundle\Security\OidcAwareLoginSuccessHandler:
    arguments:
      $defaultRoute: 'netbs.core.home.dashboard'
